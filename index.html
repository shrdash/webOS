<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoryOS Scrapbook</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="desktop">
    <section class="top-bar">
      <div class="title-chip">
        <span class="site-title">MemoryOS</span>
        <span class="site-subtitle">A lived-in scrapbook desktop</span>
      </div>
      <div class="top-info">
        <div id="current-date">June 10, 2026</div>
        <div id="current-time" class="time-label">12:00 PM</div>
      </div>
    </section>

    <section class="desktop-scene">
      <div class="decorations" id="decorations"></div>
      <div class="desktop-objects" id="desktop-objects"></div>
      <section id="window-area" class="window-area"></section>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
